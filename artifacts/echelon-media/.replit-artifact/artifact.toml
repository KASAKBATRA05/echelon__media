kind = "web"
previewPath = "/"
title = "Echelon Media"
version = "1.0.0"
id = "artifacts/echelon-media"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19639

[services.development]
run = "pnpm --filter @workspace/echelon-media run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echelon-media", "run", "build" ]
publicDir = "artifacts/echelon-media/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19639"
BASE_PATH = "/"
